<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CF Cron Worker</title>
  <style>
    :root {
      /* 玻璃拟态暗色主题（对齐 CF-Workers-UsagePanel） */
      --primary: #6366f1;
      --accent: #a855f7;
      --background: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(148, 163, 184, 0.12);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, 0.12);
      --green: #10b981;
      --amber: #eab308;
      --red: #ef4444;
      --radius: 20px;
      --radius-sm: 12px;
      --heading-grad: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--background);
      background-image:
        radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 85%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 56px; }

    /* —— 顶栏 —— */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: baseline; gap: 10px; flex-direction: column; }
    .brand .logo {
      font-size: 22px; font-weight: 700; letter-spacing: -.02em;
      background: var(--heading-grad); -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand .cron { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }

    button {
      background: var(--card-bg); color: var(--text-main); border: 1px solid var(--card-border);
      padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500;
      border-radius: var(--radius-sm); transition: all .2s; backdrop-filter: blur(12px);
    }
    button:hover:not(:disabled) { border-color: var(--primary); background: rgba(99, 102, 241, 0.15); }
    button:disabled { opacity: .5; cursor: wait; }
    button.primary { background: var(--heading-grad); color: #fff; border: none; }
    button.primary:hover:not(:disabled) { opacity: .9; }
    button.ghost-danger { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }
    button.ghost-danger:hover:not(:disabled) { background: var(--danger-soft); border-color: var(--danger); }

    /* —— 玻璃卡片 —— */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px 26px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .card-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; gap: 10px; flex-wrap: wrap;
    }
    .card-head h2 {
      margin: 0; font-size: 18px; font-weight: 600;
      background: var(--heading-grad); -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card-head .ts { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    /* —— 状态行 —— */
    .status-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(15, 23, 42, 0.4); border: 1px solid var(--card-border);
      padding: 6px 12px; border-radius: 999px; font-size: 12px; color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .status-pill b { color: var(--text-main); font-weight: 600; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.off { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .dot.idle { background: var(--text-dim); }
    .err-text { color: var(--red); font-size: 11px; }

    /* —— 告警横幅 —— */
    .alert-banner {
      background: var(--danger-soft); border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 16px;
      font-size: 13px; color: var(--red);
    }
    .alert-banner .title { font-weight: 600; margin-bottom: 6px; }
    .alert-banner pre {
      margin: 4px 0 0; white-space: pre-wrap;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
      color: var(--text-muted);
    }

    /* —— 任务一：账号卡片（对齐 UsagePanel）—— */
    .account-list { display: flex; flex-direction: column; gap: 16px; }
    .account-item {
      background: rgba(15, 23, 42, 0.35);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
    }
    .acc-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--card-border);
    }
    .acc-name { font-size: 14px; font-weight: 600; color: var(--text-main); }
    .acc-id { font-size: 11px; color: var(--text-dim); font-family: ui-monospace, Menlo, monospace; }
    .err-tag {
      display: inline-block; background: var(--danger-soft); color: var(--red);
      padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
    }

    /* 主进度条：三色渐变 + shimmer 流光 */
    .usage-section { margin-bottom: 14px; }
    .usage-section .label-row {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;
    }
    .usage-section .label { font-size: 12px; color: var(--text-muted); }
    .usage-section .percentage {
      font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--gradient-color, var(--green));
      text-shadow: 0 0 20px var(--gradient-color-shadow, rgba(16, 185, 129, 0.4));
      transition: color .3s;
    }
    .total-text { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;
    }
    .mini-card {
      background: rgba(15, 23, 42, 0.4); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 10px 12px;
    }
    .mini-card .ml { font-size: 11px; color: var(--text-muted); }
    .mini-card .mv { font-size: 16px; font-weight: 600; color: var(--text-main); font-variant-numeric: tabular-nums; margin-top: 2px; }

    .progress-track {
      height: 14px; background: rgba(15, 23, 42, 0.6); border-radius: 999px;
      overflow: hidden; position: relative; border: 1px solid var(--card-border);
    }
    .progress-bar {
      height: 100%; width: 0; border-radius: 999px; position: relative;
      background: linear-gradient(90deg, #10b981 0%, #eab308 50%, #ef4444 100%);
      background-size: 200% 100%;
      transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .progress-bar::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* 85% 阈值标记线 */
    .progress-track::after {
      content: ""; position: absolute; top: -2px; bottom: -2px; left: 85%; width: 1px;
      background: var(--red); opacity: .4; z-index: 2;
    }

    /* 资源额度细节（可折叠 <details>） */
    .quota-details { margin-top: 14px; }
    .quota-details > summary {
      cursor: pointer; list-style: none; display: inline-block;
      padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 500;
      background: var(--heading-grad); color: #fff;
      transition: opacity .2s;
    }
    .quota-details > summary::-webkit-details-marker { display: none; }
    .quota-details > summary:hover { opacity: .9; }
    .quota-details[open] > summary { margin-bottom: 12px; }
    .quota-list { display: flex; flex-direction: column; gap: 12px; }
    .quota-group {
      background: rgba(15, 23, 42, 0.3); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 12px 14px;
    }
    .quota-group .gtitle { font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
    .quota-group .gmeta { font-size: 11px; color: var(--text-dim); margin-left: 6px; font-weight: 400; }
    .quota-item { margin-bottom: 10px; }
    .quota-item:last-child { margin-bottom: 0; }
    .quota-item .row1 {
      display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px;
    }
    .quota-item .qlabel { font-size: 12px; color: var(--text-muted); }
    .quota-item .qval { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .quota-item .qval .qp { color: var(--gradient-color, var(--green)); font-weight: 600; margin-left: 4px; }
    .quota-track {
      height: 7px; background: rgba(15, 23, 42, 0.6); border-radius: 999px;
      overflow: hidden; border: 1px solid var(--card-border);
    }
    .quota-fill {
      height: 100%; width: 0; border-radius: 999px;
      background: var(--gradient-color, var(--green));
      transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .resource-note {
      font-size: 10px; color: var(--text-dim); margin-top: 12px;
      padding-top: 10px; border-top: 1px solid var(--card-border);
    }

    /* 数据集查询错误 */
    .ds-errors { margin-top: 12px; font-size: 11px; }
    .ds-errors > summary { cursor: pointer; color: var(--amber); padding: 4px 0; font-weight: 500; }
    .ds-errors[open] > summary { margin-bottom: 6px; }
    .ds-err-row {
      display: grid; grid-template-columns: 180px 1fr; gap: 8px;
      background: rgba(234, 179, 8, 0.08); border: 1px solid rgba(234, 179, 8, 0.2);
      padding: 6px 9px; border-radius: 6px; margin-bottom: 4px; align-items: start;
    }
    .ds-err-row code { font-family: ui-monospace, Menlo, monospace; color: var(--amber); font-size: 10px; word-break: break-all; }
    .ds-err-row span { color: var(--text-muted); word-break: break-all; font-size: 10px; }
    .ds-err-row.perm { background: var(--danger-soft); border-color: rgba(239, 68, 68, 0.3); }
    .ds-err-row.perm code { color: var(--red); }
    .ds-perm-hint {
      background: var(--danger-soft); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--red);
      padding: 10px 14px; border-radius: var(--radius-sm); margin-top: 12px;
      font-size: 11px; line-height: 1.6;
    }

    /* —— 任务二统计 —— */
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .stat {
      background: rgba(15, 23, 42, 0.4); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 11px 13px;
    }
    .stat .label { font-size: 11px; color: var(--text-muted); }
    .stat .num { font-size: 20px; font-weight: 700; color: var(--text-main); font-variant-numeric: tabular-nums; margin-top: 2px; }
    .stat.ok .num { color: var(--green); }
    .stat.warn .num { color: var(--amber); }
    .stat.danger .num { color: var(--red); }

    .push-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; padding: 5px 12px; border-radius: 999px;
      background: rgba(15, 23, 42, 0.4); border: 1px solid var(--card-border); color: var(--text-muted);
    }
    .push-status.ok { background: rgba(16, 185, 129, 0.12); border-color: rgba(16, 185, 129, 0.3); color: var(--green); }
    .push-status.fail { background: var(--danger-soft); border-color: rgba(239, 68, 68, 0.3); color: var(--red); }

    pre.log {
      background: rgba(15, 23, 42, 0.6); color: #c8d3e0;
      border: 1px solid var(--card-border); border-radius: var(--radius-sm);
      padding: 14px 16px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.6;
      max-height: 360px; overflow: auto; white-space: pre-wrap; word-break: break-all;
      margin: 0;
    }
    pre.log .empty { color: var(--text-dim); }

    .section-label { font-size: 12px; color: var(--text-muted); margin: 14px 0 8px; font-weight: 500; }
    .empty-state { color: var(--text-muted); font-size: 13px; padding: 8px 0; }

    /* —— 登录遮罩 —— */
    .gate {
      position: fixed; inset: 0; background: var(--background);
      background-image:
        radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 85%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
    }
    .gate-card {
      background: var(--card-bg); backdrop-filter: blur(24px);
      border: 1px solid var(--card-border); border-radius: 24px;
      padding: 40px 32px; width: 340px; text-align: center; box-shadow: var(--shadow);
    }
    .gate-card .logo {
      font-size: 22px; font-weight: 700; margin-bottom: 6px;
      background: var(--heading-grad); -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .gate-card .hint { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .gate-card input {
      width: 100%; background: rgba(15, 23, 42, 0.4); border: 1px solid var(--card-border);
      color: var(--text-main); padding: 12px 16px; font-family: inherit; font-size: 14px;
      border-radius: 12px; outline: none; text-align: center; transition: .15s;
    }
    .gate-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
    .gate-card .err { color: var(--red); font-size: 12px; min-height: 16px; margin-top: 12px; }
    .gate-card button {
      width: 100%; margin-top: 14px; padding: 12px; justify-content: center;
    }

    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--card-bg); backdrop-filter: blur(24px);
      border: 1px solid var(--card-border); color: var(--text-main);
      padding: 12px 20px; border-radius: 12px; font-size: 13px;
      opacity: 0; transition: .2s; pointer-events: none; z-index: 2000;
      box-shadow: var(--shadow);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--danger-soft); border-color: rgba(239, 68, 68, 0.3); color: var(--red); }

    .hidden { display: none !important; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- 登录遮罩 -->
  <div class="gate hidden" id="gate">
    <div class="gate-card">
      <div class="logo">CF Cron Worker</div>
      <div class="hint">请输入访问密码</div>
      <form id="loginForm">
        <input id="pwdInput" type="password" placeholder="密码" autocomplete="current-password" autofocus />
        <button type="submit" class="primary">登录</button>
      </form>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <div class="wrap">
    <!-- 顶栏 -->
    <div class="topbar">
      <div class="brand">
        <div class="logo">CF Cron Worker</div>
        <div class="cron" id="cronLabel">cron 0 23,3,7,11,15,19 * * *</div>
      </div>
      <div class="actions">
        <button id="refreshBtn">刷新</button>
        <button id="run1Btn">运行任务一</button>
        <button id="run2Btn" class="primary">运行任务二</button>
        <button id="logoutBtn" class="ghost-danger hidden">退出</button>
      </div>
    </div>

    <!-- 运行状态 -->
    <div class="glass-card">
      <div class="card-head">
        <h2>运行状态</h2>
        <span class="ts" id="statusTs">—</span>
      </div>
      <div class="status-row" id="statusRow"></div>
    </div>

    <!-- 任务一：用量 -->
    <div class="glass-card">
      <div class="card-head">
        <h2>Cloudflare 额度使用</h2>
        <span class="ts" id="usageTs">—</span>
      </div>
      <div id="alertBox" class="alert-banner hidden"></div>
      <div id="usageBody"><div class="empty-state">加载中…</div></div>
    </div>

    <!-- 任务二：外链检查 -->
    <div class="glass-card">
      <div class="card-head">
        <h2>任务二 · 外链检查与推送</h2>
        <span class="ts" id="task2Ts">—</span>
      </div>
      <div class="stat-grid" id="task2Stats"></div>
      <div style="margin-bottom: 12px;">
        <span class="push-status" id="pushStatus">—</span>
      </div>
      <div class="section-label">推送数据预览（前 50 条）</div>
      <pre class="log" id="task2Preview">加载中…</pre>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    let TOKEN = localStorage.getItem("ecw_token") || "";

    const toast = (msg, isErr) => {
      const t = $("toast");
      t.textContent = msg;
      t.className = "toast show" + (isErr ? " err" : "");
      setTimeout(() => t.className = "toast", 2400);
    };

    async function api(path, opts = {}) {
      const headers = { ...(opts.headers || {}) };
      if (TOKEN) headers["Authorization"] = "Bearer " + TOKEN;
      const res = await fetch(path, { ...opts, headers });
      if (res.status === 401) { showGate(); throw new Error("unauthorized"); }
      return res;
    }

    // —— 登录 ——
    function showGate() { $("gate").classList.remove("hidden"); $("pwdInput").focus(); }
    function hideGate() { $("gate").classList.add("hidden"); }

    async function tryLogin(password) {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (data.ok) {
        if (data.noAuth) { TOKEN = ""; localStorage.removeItem("ecw_token"); }
        else { TOKEN = password; localStorage.setItem("ecw_token", password); }
        hideGate();
        $("logoutBtn").classList.toggle("hidden", !TOKEN);
        loadAll();
        return true;
      }
      $("loginErr").textContent = "密码错误";
      return false;
    }

    $("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("loginErr").textContent = "";
      const pwd = $("pwdInput").value;
      if (!pwd) return;
      await tryLogin(pwd);
    });

    $("logoutBtn").addEventListener("click", () => {
      TOKEN = ""; localStorage.removeItem("ecw_token");
      $("logoutBtn").classList.add("hidden");
      showGate();
    });

    async function init() {
      try {
        const probe = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
        const pd = await probe.json();
        if (pd.noAuth) { TOKEN = ""; hideGate(); loadAll(); return; }
        if (TOKEN) {
          const res = await fetch("/api/status", { headers: { Authorization: "Bearer " + TOKEN } });
          if (res.ok) { hideGate(); $("logoutBtn").classList.remove("hidden"); loadAll(); return; }
        }
        showGate();
      } catch { showGate(); }
    }

    const fmt = (n) => Number(n || 0).toLocaleString("en-US");
    const esc = (s) => String(s).replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // —— 颜色函数：绿→黄→红线性插值（对齐参考项目 getGradientColor）——
    function getGradientColor(percent) {
      const p = Math.min(100, Math.max(0, percent));
      let r, g, b;
      if (p <= 50) {
        const t = p / 50;
        r = Math.round(16 + (234 - 16) * t);
        g = Math.round(185 + (179 - 185) * t);
        b = Math.round(129 + (8 - 129) * t);
      } else {
        const t = (p - 50) / 50;
        r = Math.round(234 + (239 - 234) * t);
        g = Math.round(179 + (68 - 179) * t);
        b = Math.round(8 + (68 - 8) * t);
      }
      const color = `rgb(${r}, ${g}, ${b})`;
      const shadow = `rgba(${r}, ${g}, ${b}, 0.4)`;
      return { color, shadow };
    }

    // —— 状态 ——
    async function loadStatus() {
      try {
        const res = await api("/api/status");
        const data = await res.json();
        const now = new Date();
        $("statusTs").textContent = "UTC " + now.toISOString().slice(11, 19);
        const parts = [];
        for (const [k, label] of [["task1", "任务一"], ["task2", "任务二"]]) {
          const s = data[k];
          if (!s) { parts.push(`<div class="status-pill"><span class="dot idle"></span>${label}: <b style="color:var(--text-dim)">未运行</b></div>`); continue; }
          const cls = s.ok ? "on" : "off";
          const t = new Date(s.at).toISOString().replace("T", " ").slice(0, 19) + " UTC";
          parts.push(`<div class="status-pill"><span class="dot ${cls}"></span>${label}: <b>${t}</b>${s.error ? ` <span class="err-text">${esc(s.error.slice(0, 50))}</span>` : ""}</div>`);
        }
        $("statusRow").innerHTML = parts.join("");
      } catch {}
    }

    // —— 任务一：多账号用量（玻璃拟态 + 渐变进度条 + 可折叠资源细节）——
    async function loadUsage() {
      try {
        const res = await api("/api/usage");
        const data = await res.json();
        $("usageTs").textContent = data.generatedAt ? new Date(data.generatedAt).toLocaleString() : "—";

        const alerts = data.alerts || [];
        const ab = $("alertBox");
        if (alerts.length) {
          ab.classList.remove("hidden");
          ab.innerHTML =
            `<div><div class="title">⚠ ${alerts.length} 项超阈值（≥ ${data.threshold || 85}%）</div>` +
            `<pre>${alerts.map((a) => `[${esc(a.accountName)}] ${esc(a.item.name)} = ${a.item.percent}%`).join("\n")}</pre></div>`;
        } else { ab.classList.add("hidden"); }

        const reports = data.reports || [];
        if (!reports.length) {
          $("usageBody").innerHTML = `<div class="empty-state">暂无数据，请运行任务一</div>`;
          return;
        }
        $("usageBody").innerHTML = `<div class="account-list">${reports.map(renderAccount).join("")}</div>`;
      } catch (e) { if (e.message !== "unauthorized") $("usageBody").innerHTML = `<div class="empty-state" style="color:var(--red)">加载失败: ${esc(e.message)}</div>`; }
    }

    // 渲染单个账号卡片
    function renderAccount(r) {
      const errTag = r.error ? ` <span class="err-tag">错误</span>` : "";
      const items = r.items || [];

      // 主指标：Workers + Pages 请求数合计 / 10万日限额
      const workerItem = items.find((it) => it.key === "workers_requests");
      const pagesItem = items.find((it) => it.key === "pages_requests");
      const totalReq = (workerItem?.used || 0) + (pagesItem?.used || 0);
      const totalLimit = (workerItem?.limit || 100000) + (pagesItem?.limit || 100000);
      const totalPct = Math.min(100, Math.round(totalReq / totalLimit * 10000) / 100);
      const { color, shadow } = getGradientColor(totalPct);

      // 主进度条
      const mainBar = `
        <div class="usage-section" style="--gradient-color:${color}; --gradient-color-shadow:${shadow};">
          <div class="label-row">
            <span class="label">总请求占比</span>
            <span class="percentage">${totalPct}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" style="width:${totalPct}%; background-size:${totalPct > 0 ? (100 / totalPct * 100) : 100}% 100%;"></div>
          </div>
          <div class="total-text">${fmt(totalReq)} / ${fmt(totalLimit)} 总计请求</div>
          <div class="stats-grid">
            <div class="mini-card"><div class="ml">🔶 Workers</div><div class="mv">${fmt(workerItem?.used || 0)}</div></div>
            <div class="mini-card"><div class="ml">⚡️ Pages</div><div class="mv">${fmt(pagesItem?.used || 0)}</div></div>
          </div>
        </div>
      `;

      // 资源细节（按 KV/D1/R2 分组，0% 项也展示但用渐变色低饱和）
      const resourceDetails = renderResourceQuotas(items);

      // 数据集错误
      const dse = r.datasetErrors || {};
      const dseKeys = Object.keys(dse);
      const permHits = dseKeys.filter((k) => /auth|permission|denied|forbidden|403|401/i.test(dse[k]));
      const permHitsNames = permHits.map((k) => esc(k)).join("、");
      const permHint = permHits.length
        ? `<div class="ds-perm-hint">
            <div style="font-weight:600;margin-bottom:6px">⚠ ${permHits.length} 个数据集报权限错误（${permHitsNames}）</div>
            <div style="margin-bottom:6px">查询失败通常是 API Token 权限不足。请到 Cloudflare → My Profile → API Tokens → 编辑该 Token，确认已勾选以下 <b>Account 级</b>权限（全部 Read 即可）：</div>
            <div style="margin-left:8px;margin-bottom:6px;line-height:1.7">
              · Account → <b>Account Analytics</b> → Read<br/>
              · Account → <b>D1</b> → Read<br/>
              · Account → <b>Workers KV Storage</b> → Read<br/>
              · Account → <b>Workers R2 Storage</b> → Read
            </div>
            <div style="font-size:10px;opacity:.85">
              说明：仅勾选「Workers Scripts Read」时 Workers 用量可读，但 D1/KV/R2 会因权限不足返回空或 403。
              若 Token 是 Account-level 模板，需在「Permissions」栏逐一添加上述四项后再保存（保存后需重新部署 Worker 使新 Token 生效）。
            </div>
          </div>`
        : "";
      const dseHtml = dseKeys.length
        ? `${permHint}<details class="ds-errors"><summary>⚠ ${dseKeys.length} 个数据集查询失败</summary>` +
          dseKeys.map((k) => {
            const isPerm = /auth|permission|denied|forbidden|403|401/i.test(dse[k]);
            return `<div class="ds-err-row${isPerm ? " perm" : ""}"><code>${esc(k)}</code><span>${esc(dse[k]).slice(0, 200)}</span></div>`;
          }).join("") +
          `</details>`
        : "";

      return `
        <div class="account-item">
          <div class="acc-head">
            <span class="acc-name">${esc(r.accountName || r.accountId)}</span>
            <span class="acc-id">${esc(r.accountId)}</span>
            ${errTag}
          </div>
          ${mainBar}
          ${resourceDetails}
          ${dseHtml}
        </div>
      `;
    }

    // 渲染资源额度细节（可折叠，按 KV/D1/R2 分组）
    function renderResourceQuotas(items) {
      const kvItems = items.filter((it) => it.key.startsWith("kv_"));
      const d1Items = items.filter((it) => it.key.startsWith("d1_"));
      const r2Items = items.filter((it) => it.key.startsWith("r2_"));

      const renderQuotaBar = (it) => {
        const p = Math.min(100, it.percent);
        const { color } = getGradientColor(p);
        const periodLabel = it.period === "daily" ? "今日" : "本月";
        return `
          <div class="quota-item" style="--gradient-color:${color};">
            <div class="row1">
              <span class="qlabel">${esc(it.name)}<span style="color:var(--text-dim);font-size:10px;margin-left:4px">(${periodLabel})</span></span>
              <span class="qval">${fmt(it.used)} / ${fmt(it.limit)} ${esc(it.unit)} <span class="qp">${p}%</span></span>
            </div>
            <div class="quota-track"><div class="quota-fill" style="width:${p}%;"></div></div>
          </div>
        `;
      };

      const groups = [];
      if (kvItems.length) groups.push(`
        <div class="quota-group">
          <div class="gtitle">📦 KV <span class="gmeta">按 UTC 自然日统计</span></div>
          ${kvItems.map(renderQuotaBar).join("")}
        </div>
      `);
      if (d1Items.length) groups.push(`
        <div class="quota-group">
          <div class="gtitle">🗄️ D1 <span class="gmeta">按 UTC 自然日统计</span></div>
          ${d1Items.map(renderQuotaBar).join("")}
        </div>
      `);
      if (r2Items.length) groups.push(`
        <div class="quota-group">
          <div class="gtitle">💾 R2 <span class="gmeta">按自然月统计</span></div>
          ${r2Items.map(renderQuotaBar).join("")}
        </div>
      `);

      return `
        <details class="quota-details">
          <summary>展开资源额度细节</summary>
          <div class="quota-list">${groups.join("")}</div>
          <div class="resource-note">D1/KV 按 UTC 自然日统计，R2 操作按本月统计。存储为最近一次指标快照。</div>
        </details>
      `;
    }

    // —— 任务二 ——
    async function loadTask2() {
      try {
        const res = await api("/api/task2/result");
        const data = await res.json();
        $("task2Ts").textContent = data.generatedAt ? new Date(data.generatedAt).toLocaleString() : "—";
        const fs = data.filterSummary || {};
        const modeLabel = data.batchMode
          ? '<span style="color:var(--green)">批量模式</span>' + (data.batchFailures > 0 ? ` <span style="color:var(--amber)">(${data.batchFailures} 批失败跳过)</span>` : '')
          : '<span style="color:var(--amber)">直连模式（≤20条）</span>';
        const diag = data.envDiag;
        const hasKey = diag && (diag.TASK2_BATCH_SECRET || diag.TASK2_BATCH_KEY);
        const diagHtml = diag
          ? `<div style="margin-top:6px;font-size:11px;color:var(--text-dim)">
              环境变量诊断：
              <span style="color:${diag.WORKER_BASE_URL ? 'var(--green)' : 'var(--red)'}">WORKER_BASE_URL=${diag.WORKER_BASE_URL ? '✓' : '✗'}(len=${diag.WORKER_BASE_URL_length})</span>
              <span style="color:${diag.TASK2_BATCH_SECRET ? 'var(--green)' : 'var(--red)'}">TASK2_BATCH_SECRET=${diag.TASK2_BATCH_SECRET ? '✓' : '✗'}(len=${diag.TASK2_BATCH_SECRET_length})</span>
              <span style="color:${diag.TASK2_BATCH_KEY ? 'var(--green)' : 'var(--red)'}">TASK2_BATCH_KEY=${diag.TASK2_BATCH_KEY ? '✓' : '✗'}(len=${diag.TASK2_BATCH_KEY_length})</span>
            </div>`
          : '';
        const stats = [
          ["listCount", "列表总数", ""],
          ["checkedCount", "已检查", ""],
          ["filteredCount", "通过过滤", "ok"],
          ["finalCount", "推送条数", "ok"],
        ];
        const filterStats = [
          ["ok", "通过", "ok"],
          ["timeout", "超时", "warn"],
          ["error", "错误", "danger"],
          ["nonResidential", "非住宅", "danger"],
          ["badPurity", "纯净度差", "danger"],
        ];
        $("task2Stats").innerHTML =
          `<div class="stat" style="grid-column:1/-1"><div class="label">运行模式</div><div class="num" style="font-size:13px">${modeLabel}${diagHtml}</div></div>` +
          stats.map(([k, l, c]) => `<div class="stat ${c}"><div class="label">${l}</div><div class="num">${data[k] ?? 0}</div></div>`).join("") +
          filterStats.map(([k, l, c]) => `<div class="stat ${c}"><div class="label">${l}</div><div class="num">${fs[k] ?? 0}</div></div>`).join("");

        const ps = $("pushStatus");
        if (data.pushed) { ps.className = "push-status ok"; ps.textContent = "推送成功 · " + (data.pushStatus || ""); }
        else { ps.className = "push-status fail"; ps.textContent = "推送未成功 · " + (data.pushStatus || "—"); }

        const lines = data.finalLinesPreview || [];
        $("task2Preview").innerHTML = lines.length
          ? lines.map(esc).join("\n")
          : "<span class='empty'>暂无数据，请运行任务二</span>";
      } catch (e) { if (e.message !== "unauthorized") $("task2Preview").textContent = "加载失败: " + e.message; }
    }

    async function runTask(task, btn) {
      btn.disabled = true; const old = btn.textContent; btn.textContent = "运行中…";
      try {
        const res = await api("/api/run?task=" + task, { method: "POST" });
        const data = await res.json();
        if (data.ok) {
          if (task === 1) {
            const n = data.reports?.length ?? 0;
            const a = data.alerts?.length ?? 0;
            toast(`任务一完成 · ${n} 个账号${a ? " · " + a + " 项告警" : ""}`);
            loadUsage();
          } else {
            const r = data.result || {};
            toast(`任务二完成 · 通过 ${r.filterSummary?.ok ?? 0} · 推送 ${r.finalCount ?? 0}`);
            loadTask2();
          }
          loadStatus();
        } else { toast("失败: " + (data.error || "未知错误"), true); }
      } catch (e) { if (e.message !== "unauthorized") toast("失败: " + e.message, true); }
      finally { btn.disabled = false; btn.textContent = old; }
    }

    function loadAll() { loadStatus(); loadUsage(); loadTask2(); }

    $("refreshBtn").addEventListener("click", loadAll);
    $("run1Btn").addEventListener("click", (e) => runTask(1, e.target));
    $("run2Btn").addEventListener("click", (e) => runTask(2, e.target));

    init();
  </script>
</body>
</html>
