<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CF Cron Worker</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f7f8fa;
      --panel: #ffffff;
      --border: #eceef1;
      --border-strong: #d8dce2;
      --text: #1a1d23;
      --text-soft: #5a6170;
      --muted: #9aa1ad;
      --primary: #2563eb;
      --primary-soft: #eff4ff;
      --green: #16a34a;
      --green-soft: #ecfdf5;
      --amber: #d97706;
      --amber-soft: #fffbeb;
      --red: #dc2626;
      --red-soft: #fef2f2;
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg-soft);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 48px; }

    /* —— 顶栏 —— */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand .logo {
      font-size: 18px; font-weight: 600; letter-spacing: -.01em;
      color: var(--text);
    }
    .brand .logo .dot { color: var(--primary); }
    .brand .cron { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }

    button {
      background: var(--panel); color: var(--text-soft); border: 1px solid var(--border-strong);
      padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 13px;
      border-radius: var(--radius-sm); transition: all .15s; font-weight: 500;
    }
    button:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }
    button:disabled { opacity: .5; cursor: wait; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover:not(:disabled) { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    button.ghost-danger { color: var(--red); border-color: #fecaca; }
    button.ghost-danger:hover:not(:disabled) { background: var(--red-soft); border-color: var(--red); color: var(--red); }

    /* —— 卡片 —— */
    .card-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .panel-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; gap: 10px; flex-wrap: wrap;
    }
    .panel-head h2 { margin: 0; font-size: 14px; font-weight: 600; color: var(--text); }
    .panel-head .ts { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* —— 状态行 —— */
    .status-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--bg-soft); border: 1px solid var(--border);
      padding: 5px 11px; border-radius: 999px; font-size: 12px; color: var(--text-soft);
      font-variant-numeric: tabular-nums;
    }
    .status-pill b { color: var(--text); font-weight: 600; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.on { background: var(--green); }
    .dot.off { background: var(--red); }
    .dot.idle { background: var(--muted); }
    .err-text { color: var(--red); font-size: 11px; }

    /* —— 告警横幅 —— */
    .alert-banner {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--red-soft); border: 1px solid #fecaca;
      padding: 10px 14px; border-radius: var(--radius-sm); margin-bottom: 14px;
      font-size: 12px; color: var(--red);
    }
    .alert-banner .title { font-weight: 600; margin-bottom: 4px; }
    .alert-banner pre { margin: 4px 0 0; white-space: pre-wrap; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 11px; }

    /* —— 任务一：多账号进度条 —— */
    .acc-block { margin-bottom: 22px; }
    .acc-block:last-child { margin-bottom: 0; }
    .acc-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .acc-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .acc-id { font-size: 11px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
    .err-tag {
      display: inline-block; background: var(--red-soft); color: var(--red);
      padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600;
    }

    /* 0% 折叠区 */
    .show-all-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; color: var(--primary);
      font-size: 12px; padding: 8px 0 4px; cursor: pointer;
      font-family: inherit; font-weight: 500;
    }
    .show-all-btn:hover:not(:disabled) { background: none; border: none; color: #1d4ed8; text-decoration: underline; }
    .show-all-btn .arrow { transition: transform .2s; display: inline-block; }
    .show-all-btn.open .arrow { transform: rotate(90deg); }
    /* 注意：必须用 :not(.open) 提升 specificity 至 (0,2,0)，否则会被后置的
       .usage-grid { display: grid } (0,1,0) 同级覆盖，导致折叠失效 */
    .inactive-grid:not(.open) { display: none; }
    .inactive-grid.open { display: grid; }
    .inactive-label { font-size: 11px; color: var(--muted); margin: 6px 0 0; }
    .inactive-label .count { color: var(--text-soft); font-weight: 600; }
    .empty-hint { font-size: 11px; color: var(--muted); padding: 6px 0; }
    /* 数据集查询错误（解释为何为 0） */
    .ds-errors { margin-top: 10px; font-size: 11px; }
    .ds-errors > summary { cursor: pointer; color: var(--amber); padding: 4px 0; font-weight: 500; }
    .ds-errors[open] > summary { margin-bottom: 6px; }
    .ds-err-row {
      display: grid; grid-template-columns: 200px 1fr; gap: 8px;
      background: var(--amber-soft); border: 1px solid #fde68a;
      padding: 5px 8px; border-radius: 4px; margin-bottom: 4px; align-items: start;
    }
    .ds-err-row code { font-family: ui-monospace, Menlo, monospace; color: var(--amber); font-size: 10px; word-break: break-all; }
    .ds-err-row span { color: var(--text-soft); word-break: break-all; }
    .ds-err-row.perm { background: var(--red-soft); border-color: #fecaca; }
    .ds-err-row.perm code { color: var(--red); }
    .ds-perm-hint {
      background: var(--red-soft); border: 1px solid #fecaca; color: var(--red);
      padding: 8px 12px; border-radius: var(--radius-sm); margin-top: 10px;
      font-size: 11px; line-height: 1.6;
    }

    .usage-grid {
      display: grid; grid-template-columns: 1fr; gap: 10px;
    }
    @media (min-width: 720px) {
      .usage-grid { grid-template-columns: 1fr 1fr; }
    }
    .usage-row {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
    }
    .usage-row .top {
      display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
      margin-bottom: 6px;
    }
    .usage-row .name { font-size: 12px; color: var(--text-soft); }
    .usage-row .period { font-size: 10px; color: var(--muted); margin-left: 4px; }
    .usage-row .pct { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .usage-row .pct.warn { color: var(--amber); }
    .usage-row .pct.danger { color: var(--red); }
    .usage-row .meta { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; margin-top: 4px; }

    .progress {
      height: 6px; background: #eef0f3; border-radius: 3px; overflow: hidden; position: relative;
    }
    .progress > i {
      display: block; height: 100%; width: 0; background: var(--green);
      border-radius: 3px; transition: width .4s ease;
    }
    .progress.warn > i { background: var(--amber); }
    .progress.danger > i { background: var(--red); }
    /* 85% 阈值标记线 */
    .progress::after {
      content: ""; position: absolute; top: -2px; bottom: -2px; left: 85%; width: 1px;
      background: var(--red); opacity: .35;
    }

    /* —— 任务二统计 —— */
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px; margin-bottom: 14px;
    }
    .stat {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 9px 11px;
    }
    .stat .label { font-size: 11px; color: var(--muted); }
    .stat .num { font-size: 18px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .stat.ok .num { color: var(--green); }
    .stat.warn .num { color: var(--amber); }
    .stat.danger .num { color: var(--red); }

    .push-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; padding: 4px 10px; border-radius: 999px;
      background: var(--bg-soft); border: 1px solid var(--border);
    }
    .push-status.ok { background: var(--green-soft); border-color: #bbf7d0; color: var(--green); }
    .push-status.fail { background: var(--red-soft); border-color: #fecaca; color: var(--red); }

    pre.log {
      background: #0f1115; color: #c8d3e0;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 14px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.6;
      max-height: 320px; overflow: auto; white-space: pre-wrap; word-break: break-all;
      margin: 0;
    }
    pre.log .empty { color: #5a6170; }

    /* —— 登录遮罩 —— */
    .gate {
      position: fixed; inset: 0; background: var(--bg-soft); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .gate-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 32px 28px; width: 320px; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.04);
    }
    .gate-card .logo { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .gate-card .logo .dot { color: var(--primary); }
    .gate-card .hint { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .gate-card input {
      width: 100%; background: var(--bg-soft); border: 1px solid var(--border-strong);
      color: var(--text); padding: 10px 14px; font-family: inherit; font-size: 14px;
      border-radius: var(--radius-sm); outline: none; text-align: center; transition: .15s;
    }
    .gate-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
    .gate-card .err { color: var(--red); font-size: 12px; min-height: 16px; margin-top: 10px; }
    .gate-card button {
      width: 100%; margin-top: 12px; padding: 10px; justify-content: center;
    }

    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--text); color: #fff;
      padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13px;
      opacity: 0; transition: .2s; pointer-events: none; z-index: 2000;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--red); }

    .hidden { display: none !important; }
    .section-label { font-size: 12px; color: var(--muted); margin: 12px 0 8px; font-weight: 500; }
    .empty-state { color: var(--muted); font-size: 13px; padding: 8px 0; }
  </style>
</head>
<body>
  <!-- 登录遮罩 -->
  <div class="gate hidden" id="gate">
    <div class="gate-card">
      <div class="logo">CF Cron Worker<span class="dot">.</span></div>
      <div class="hint">请输入访问密码</div>
      <form id="loginForm">
        <input id="pwdInput" type="password" placeholder="密码" autocomplete="current-password" autofocus />
        <button type="submit" class="primary">登录</button>
      </form>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <div class="wrap">
    <!-- 顶栏 -->
    <div class="topbar">
      <div class="brand">
        <div class="logo">CF Cron Worker<span class="dot">.</span></div>
        <div class="cron" id="cronLabel">cron 0 23,3,7,11,15,19 * * *</div>
      </div>
      <div class="actions">
        <button id="refreshBtn">刷新</button>
        <button id="run1Btn">运行任务一</button>
        <button id="run2Btn" class="primary">运行任务二</button>
        <button id="logoutBtn" class="ghost-danger hidden">退出</button>
      </div>
    </div>

    <!-- 运行状态 -->
    <div class="card-panel">
      <div class="panel-head">
        <h2>运行状态</h2>
        <span class="ts" id="statusTs">—</span>
      </div>
      <div class="status-row" id="statusRow"></div>
    </div>

    <!-- 任务一：用量 -->
    <div class="card-panel">
      <div class="panel-head">
        <h2>任务一 · Cloudflare 用量</h2>
        <span class="ts" id="usageTs">—</span>
      </div>
      <div id="alertBox" class="alert-banner hidden"></div>
      <div id="usageBody"><div class="empty-state">加载中…</div></div>
    </div>

    <!-- 任务二：外链检查 -->
    <div class="card-panel">
      <div class="panel-head">
        <h2>任务二 · 外链检查与推送</h2>
        <span class="ts" id="task2Ts">—</span>
      </div>
      <div class="stat-grid" id="task2Stats"></div>
      <div style="margin-bottom: 12px;">
        <span class="push-status" id="pushStatus">—</span>
      </div>
      <div class="section-label">推送数据预览（前 50 条）</div>
      <pre class="log" id="task2Preview">加载中…</pre>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    let TOKEN = localStorage.getItem("ecw_token") || "";

    const toast = (msg, isErr) => {
      const t = $("toast");
      t.textContent = msg;
      t.className = "toast show" + (isErr ? " err" : "");
      setTimeout(() => t.className = "toast", 2200);
    };

    async function api(path, opts = {}) {
      const headers = { ...(opts.headers || {}) };
      if (TOKEN) headers["Authorization"] = "Bearer " + TOKEN;
      const res = await fetch(path, { ...opts, headers });
      if (res.status === 401) { showGate(); throw new Error("unauthorized"); }
      return res;
    }

    // —— 登录 ——
    function showGate() { $("gate").classList.remove("hidden"); $("pwdInput").focus(); }
    function hideGate() { $("gate").classList.add("hidden"); }

    async function tryLogin(password) {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (data.ok) {
        if (data.noAuth) { TOKEN = ""; localStorage.removeItem("ecw_token"); }
        else { TOKEN = password; localStorage.setItem("ecw_token", password); }
        hideGate();
        $("logoutBtn").classList.toggle("hidden", !TOKEN);
        loadAll();
        return true;
      }
      $("loginErr").textContent = "密码错误";
      return false;
    }

    $("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("loginErr").textContent = "";
      const pwd = $("pwdInput").value;
      if (!pwd) return;
      await tryLogin(pwd);
    });

    $("logoutBtn").addEventListener("click", () => {
      TOKEN = ""; localStorage.removeItem("ecw_token");
      $("logoutBtn").classList.add("hidden");
      showGate();
    });

    async function init() {
      try {
        const probe = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
        const pd = await probe.json();
        if (pd.noAuth) { TOKEN = ""; hideGate(); loadAll(); return; }
        if (TOKEN) {
          const res = await fetch("/api/status", { headers: { Authorization: "Bearer " + TOKEN } });
          if (res.ok) { hideGate(); $("logoutBtn").classList.remove("hidden"); loadAll(); return; }
        }
        showGate();
      } catch { showGate(); }
    }

    const fmt = (n) => Number(n || 0).toLocaleString("en-US");
    const pctClass = (p) => p >= 85 ? "danger" : p >= 70 ? "warn" : "";
    const pctColor = (p) => p >= 85 ? "danger" : p >= 70 ? "warn" : "";
    const esc = (s) => String(s).replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // —— 状态 ——
    async function loadStatus() {
      try {
        const res = await api("/api/status");
        const data = await res.json();
        const now = new Date();
        $("statusTs").textContent = "UTC " + now.toISOString().slice(11, 19);
        const parts = [];
        for (const [k, label] of [["task1", "任务一"], ["task2", "任务二"]]) {
          const s = data[k];
          if (!s) { parts.push(`<div class="status-pill"><span class="dot idle"></span>${label}: <b style="color:var(--muted)">未运行</b></div>`); continue; }
          const cls = s.ok ? "on" : "off";
          const t = new Date(s.at).toISOString().replace("T", " ").slice(0, 19) + " UTC";
          parts.push(`<div class="status-pill"><span class="dot ${cls}"></span>${label}: <b>${t}</b>${s.error ? ` <span class="err-text">${esc(s.error.slice(0, 50))}</span>` : ""}</div>`);
        }
        $("statusRow").innerHTML = parts.join("");
      } catch {}
    }

    // —— 任务一：多账号进度条（0% 折叠到「显示全部」）——
    async function loadUsage() {
      try {
        const res = await api("/api/usage");
        const data = await res.json();
        $("usageTs").textContent = data.generatedAt ? new Date(data.generatedAt).toLocaleString() : "—";

        const alerts = data.alerts || [];
        const ab = $("alertBox");
        if (alerts.length) {
          ab.classList.remove("hidden");
          ab.innerHTML =
            `<div><div class="title">⚠ ${alerts.length} 项超阈值（≥ ${data.threshold || 85}%）</div>` +
            `<pre>${alerts.map((a) => `[${esc(a.accountName)}] ${esc(a.item.name)} = ${a.item.percent}%`).join("\n")}</pre></div>`;
        } else { ab.classList.add("hidden"); }

        const reports = data.reports || [];
        if (!reports.length) {
          $("usageBody").innerHTML = `<div class="empty-state">暂无数据，请运行任务一</div>`;
          return;
        }
        $("usageBody").innerHTML = reports.map((r) => {
          const errTag = r.error ? ` <span class="err-tag">错误</span>` : "";
          const all = r.items || [];
          // 拆分：>0% 显示，=0% 折叠
          const active = all.filter((it) => it.percent > 0);
          const inactive = all.filter((it) => it.percent === 0);

          const renderItem = (it) => {
            const p = it.percent;
            const cls = pctClass(p);
            return `
              <div class="usage-row">
                <div class="top">
                  <span class="name">${esc(it.name)}<span class="period">（${it.period === "daily" ? "每日" : "每月"}）</span></span>
                  <span class="pct ${pctColor(p)}">${p}%</span>
                </div>
                <div class="progress ${cls}"><i style="width:${Math.min(100, p)}%"></i></div>
                <div class="meta">${fmt(it.used)} / ${fmt(it.limit)} ${esc(it.unit)}</div>
              </div>
            `;
          };

          const activeHtml = active.length
            ? `<div class="usage-grid">${active.map(renderItem).join("")}</div>`
            : `<div class="empty-hint">该账号暂无任何用量记录</div>`;

          const inactiveHtml = inactive.length
            ? `<button class="show-all-btn" data-toggle="inactive">
                 <span class="arrow">›</span> 显示未使用项（<b>${inactive.length}</b>）
               </button>
               <div class="inactive-grid usage-grid">${inactive.map(renderItem).join("")}</div>`
            : "";

          // 各数据集的 GraphQL 错误（解释为何为 0）
          const dse = r.datasetErrors || {};
          const dseKeys = Object.keys(dse);
          // 检测权限类错误（token 权限不足是 D1/KV/R2 全 0 的常见根因）
          const permHits = dseKeys.filter((k) => /auth|permission|denied|forbidden|403|401/i.test(dse[k]));
          const permHint = permHits.length
            ? `<div class="ds-perm-hint">⚠ ${permHits.length} 个数据集报权限错误：API Token 可能缺少「Account → Account Analytics → Read」权限。请到 Cloudflare 仪表盘 → My Profile → API Tokens 编辑该 Token，添加此权限后重新部署。</div>`
            : "";
          const dseHtml = dseKeys.length
            ? `${permHint}<details class="ds-errors"><summary>⚠ ${dseKeys.length} 个数据集查询失败（点击查看）</summary>` +
              dseKeys.map((k) => {
                const isPerm = /auth|permission|denied|forbidden|403|401/i.test(dse[k]);
                return `<div class="ds-err-row${isPerm ? " perm" : ""}"><code>${esc(k)}</code><span>${esc(dse[k]).slice(0, 200)}</span></div>`;
              }).join("") +
              `</details>`
            : "";

          return `
            <div class="acc-block">
              <div class="acc-head">
                <span class="acc-name">${esc(r.accountName || r.accountId)}</span>
                <span class="acc-id">${esc(r.accountId)}</span>
                ${errTag}
              </div>
              ${activeHtml}
              ${inactiveHtml}
              ${dseHtml}
            </div>
          `;
        }).join("");
      } catch (e) { if (e.message !== "unauthorized") $("usageBody").innerHTML = `<div class="empty-state" style="color:var(--red)">加载失败: ${esc(e.message)}</div>`; }
    }

    // —— 任务二 ——
    async function loadTask2() {
      try {
        const res = await api("/api/task2/result");
        const data = await res.json();
        $("task2Ts").textContent = data.generatedAt ? new Date(data.generatedAt).toLocaleString() : "—";
        const fs = data.filterSummary || {};
        const modeLabel = data.batchMode
          ? '<span style="color:var(--green)">批量模式</span>'
          : '<span style="color:var(--amber)">直连模式（≤20条）</span>';
        const diag = data.envDiag;
        const diagHtml = diag
          ? `<div style="margin-top:6px;font-size:11px;color:var(--text-dim)">
              环境变量诊断：
              <span style="color:${diag.WORKER_BASE_URL ? 'var(--green)' : 'var(--danger)'}">WORKER_BASE_URL=${diag.WORKER_BASE_URL ? '✓' : '✗'}(len=${diag.WORKER_BASE_URL_length})</span>
              <span style="color:${diag.TASK2_BATCH_SECRET ? 'var(--green)' : 'var(--danger)'}">TASK2_BATCH_SECRET=${diag.TASK2_BATCH_SECRET ? '✓' : '✗'}(len=${diag.TASK2_BATCH_SECRET_length})</span>
              ${(!diag.WORKER_BASE_URL || !diag.TASK2_BATCH_SECRET) ? '<div style="color:var(--amber);margin-top:2px">提示：两者必须同时配置且非空才启用批量模式。Workers Builds 部署需确认变量在 Production 环境，且重新部署后生效。</div>' : ''}
            </div>`
          : '';
        const stats = [
          ["listCount", "列表总数", ""],
          ["checkedCount", "已检查", ""],
          ["filteredCount", "通过过滤", "ok"],
          ["finalCount", "推送条数", "ok"],
        ];
        const filterStats = [
          ["ok", "通过", "ok"],
          ["timeout", "超时", "warn"],
          ["error", "错误", "danger"],
          ["nonResidential", "非住宅", "danger"],
          ["badPurity", "纯净度差", "danger"],
        ];
        $("task2Stats").innerHTML =
          `<div class="stat" style="grid-column:1/-1"><div class="label">运行模式</div><div class="num" style="font-size:12px">${modeLabel}${diagHtml}</div></div>` +
          stats.map(([k, l, c]) => `<div class="stat ${c}"><div class="label">${l}</div><div class="num">${data[k] ?? 0}</div></div>`).join("") +
          filterStats.map(([k, l, c]) => `<div class="stat ${c}"><div class="label">${l}</div><div class="num">${fs[k] ?? 0}</div></div>`).join("");

        const ps = $("pushStatus");
        if (data.pushed) { ps.className = "push-status ok"; ps.textContent = "推送成功 · " + (data.pushStatus || ""); }
        else { ps.className = "push-status fail"; ps.textContent = "推送未成功 · " + (data.pushStatus || "—"); }

        const lines = data.finalLinesPreview || [];
        $("task2Preview").innerHTML = lines.length
          ? lines.map(esc).join("\n")
          : "<span class='empty'>暂无数据，请运行任务二</span>";
      } catch (e) { if (e.message !== "unauthorized") $("task2Preview").textContent = "加载失败: " + e.message; }
    }

    async function runTask(task, btn) {
      btn.disabled = true; const old = btn.textContent; btn.textContent = "运行中…";
      try {
        const res = await api("/api/run?task=" + task, { method: "POST" });
        const data = await res.json();
        if (data.ok) {
          if (task === 1) {
            const n = data.reports?.length ?? 0;
            const a = data.alerts?.length ?? 0;
            toast(`任务一完成 · ${n} 个账号${a ? " · " + a + " 项告警" : ""}`);
            loadUsage();
          } else {
            const r = data.result || {};
            toast(`任务二完成 · 通过 ${r.filterSummary?.ok ?? 0} · 推送 ${r.finalCount ?? 0}`);
            loadTask2();
          }
          loadStatus();
        } else { toast("失败: " + (data.error || "未知错误"), true); }
      } catch (e) { if (e.message !== "unauthorized") toast("失败: " + e.message, true); }
      finally { btn.disabled = false; btn.textContent = old; }
    }

    function loadAll() { loadStatus(); loadUsage(); loadTask2(); }

    $("refreshBtn").addEventListener("click", loadAll);
    $("run1Btn").addEventListener("click", (e) => runTask(1, e.target));
    $("run2Btn").addEventListener("click", (e) => runTask(2, e.target));

    // 事件委托：「显示未使用项」按钮点击 → 切换紧邻的 inactive-grid
    $("usageBody").addEventListener("click", (e) => {
      const btn = (e.target.closest("[data-toggle='inactive']"));
      if (!btn) return;
      const grid = btn.nextElementSibling;
      if (!grid) return;
      btn.classList.toggle("open");
      grid.classList.toggle("open");
    });

    init();
  </script>
</body>
</html>
