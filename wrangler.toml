name = "cf-edge-cron-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"

# 定时任务：每 4 小时触发一次，单次只跑一个任务
#   方案 C：任务一收尾在 UTC 23:00（贴近 0 点限额刷新前）
#   UTC 11/19/23 时 → 任务一（多账号 Cloudflare 用量轮询 + 85% 阈值告警）
#   UTC 3/7/15  时 → 任务二（外链检查 + 纯净度过滤 + 拼接推送）
[triggers]
crons = ["0 23,3,7,11,15,19 * * *"]

# 允许把 .html 作为文本模块导入（dashboard 用）
rules = [
  { type = "Text", globs = ["**/*.html"], fallthrough = true }
]

# 使用 KV 存储配置 / 缓存结果 / 运行状态
[[kv_namespaces]]
binding = "CONFIG_KV"
id = "c77cb4d790d648f0897a8b740c8e552c"

[vars]
# ============ 任务一：多账号 Cloudflare 用量轮询 ============
# 推荐用 `wrangler secret put` 注入。CF_ACCOUNTS 为 JSON 数组：
#   [{"id":"accId1","token":"token1","name":"main"},{"id":"accId2","token":"token2","name":"backup"}]
#
# 【重要】API Token 权限要求（D1/KV/R2 用量为 0 通常是 token 权限不足）
#   创建 Token 时（My Profile → API Tokens → Create Custom Token），
#   必须勾选以下 Account 级权限，否则各数据集查询会返回空或权限错误：
#     Account → Account Analytics      → Read   （必需，GraphQL Analytics API 统一权限）
#     Account → D1                     → Read   （D1 行读写统计）
#     Account → Workers KV Storage     → Read   （KV 操作统计）
#     Account → Workers R2 Storage     → Read   （R2 操作统计）
#   若只勾了 "Workers Scripts Read"，Workers 用量能读但 D1/KV/R2 会全为 0。
#
# CF_ACCOUNTS = '[{"id":"","token":"","name":""}]'
# 向后兼容：单账号（CF_ACCOUNTS 未配置时使用）
# CF_ACCOUNT_ID = "your-cloudflare-account-id"
# CF_API_TOKEN  = "your-cloudflare-api-token"

# 告警阈值（百分比，达到即推送 notifyx），默认 85
# ALERT_THRESHOLD = "85"
# Notifyx 推送 webhook（达到阈值时调用），格式 POST {title,content}
# NOTIFYX_WEBHOOK = "https://www.notifyx.cc/api/v1/send/YOUR_KEY"

# ============ 任务二：外链检查 + 纯净度过滤 + 拼接推送 ============
# 1) fetch 外链列表的 URL（返回每行一个字符串）
# TASK2_LIST_URL = "https://example.com/list.txt"
# 2) GET 检查的 base URL（与每行字符串拼接，返回 CheckSocks5 风格 JSON：{link, exit:{...}}）
# TASK2_CHECK_BASE_URL = "https://your-check-worker.example.com/check?proxy="
# 3) 另一组数据 URL（返回每行一个字符串，行数少于链接时循环复用）
# TASK2_EXTRA_DATA_URL = "https://example.com/extra.txt"
# 4) 最终拼接数据推送 URL（POST，body 为每行一条文本）
# TASK2_PUSH_URL = "https://your-push-endpoint.example.com/ingest"

# 任务二性能参数（可选）
# 批量模式（推荐，突破免费版 50 subrequest 限制，可处理 200+ 外链）：
#   配置 WORKER_BASE_URL + TASK2_BATCH_SECRET 后自动启用。
#   N 个外链 → ⌈N/batch_size⌉ 个 POST /api/task2/batch-check（self-call）
#   每个批量请求是独立 invocation，有独立 50 subrequest 预算。
# 未配置则降级为直连模式（每条外链单独 check，免费版 N≤47）。
TASK2_MAX_ITEMS = "200"       # 单次最多处理多少条外链（批量模式可调到 500+）
TASK2_CONCURRENCY = "20"      # 直连模式并发数；批量模式下=默认 batch_size
TASK2_TIMEOUT_MS = "8000"     # 单 check 请求超时
WORKER_BASE_URL = "https://cron.cfwarden.qzz.io"  # worker 自身公网 URL（批量模式必需）
# 批量接口加密鉴权密钥。两种方式任选其一：
#   1) wrangler secret put TASK2_BATCH_SECRET（加密 secret，推荐）
#   2) 此处明文变量 TASK2_BATCH_KEY（Workers Builds 下若加密 secret 注入失败用此）
# TASK2_BATCH_SECRET = ""
# TASK2_BATCH_KEY = ""
# TASK2_BATCH_SIZE = "10"                                # 每批外链数（默认 10，≤25 安全；越小 batch-check 越快不易 522）
# TASK2_BATCH_CONCURRENCY = "4"                          # 同时进行的批次数（默认 4）

# ============ 面板 / API 鉴权 ============
# 留空则不启用鉴权。建议用 `wrangler secret put AUTH_PASSWORD` 注入。
# 面板登录密码 = API Bearer token = 此值。cron 不受影响。
# AUTH_PASSWORD = "your-strong-password"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

